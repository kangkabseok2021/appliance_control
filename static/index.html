<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appliance Control System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 24px; }
    h1   { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #64748b; margin-bottom: 28px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 900px; margin: 0 auto; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; }
    .card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 14px; }

    /* Progress bar */
    .phases { display: flex; gap: 4px; margin-bottom: 8px; }
    .phase  { flex: 1; height: 8px; border-radius: 4px; background: #334155; transition: background 0.4s; }
    .phase.active   { background: #38bdf8; box-shadow: 0 0 8px #38bdf866; animation: pulse 1.5s infinite; }
    .phase.done     { background: #4ade80; }
    .phase.error    { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .phase-labels { display: flex; gap: 4px; }
    .phase-label  { flex: 1; font-size: 8px; color: #64748b; text-align: center; }

    /* State badge */
    .state-badge { display: inline-block; font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 8px; margin-bottom: 12px; }
    .badge-IDLE         { background:#1e293b; color:#94a3b8; border:1px solid #334155; }
    .badge-INITIALISING { background:#1e3a5f; color:#38bdf8; border:1px solid #38bdf8; }
    .badge-WATER_INTAKE { background:#1e3a5f; color:#38bdf8; border:1px solid #38bdf8; }
    .badge-HEATING      { background:#451a03; color:#f59e0b; border:1px solid #f59e0b; }
    .badge-PROCESSING   { background:#14532d; color:#4ade80; border:1px solid #4ade80; }
    .badge-DRAINING     { background:#1e3a5f; color:#818cf8; border:1px solid #818cf8; }
    .badge-COMPLETE     { background:#14532d; color:#4ade80; border:1px solid #4ade80; }
    .badge-ERROR        { background:#450a0a; color:#f87171; border:1px solid #f87171; }

    /* Temperature gauge */
    canvas { display: block; margin: 0 auto; }

    /* Metrics */
    .metrics { display: flex; flex-direction: column; gap: 10px; }
    .metric  { display: flex; justify-content: space-between; align-items: center; }
    .metric-label { font-size: 11px; color: #64748b; }
    .metric-value { font-size: 16px; font-weight: 700; color: #38bdf8; }

    /* Buttons */
    .buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    button {
      font-size: 12px; font-weight: 600; padding: 8px 20px; border-radius: 6px;
      border: none; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-start { background: #38bdf8; color: #0f172a; }
    .btn-stop  { background: #f87171; color: #0f172a; }
    .btn-reset { background: #4ade80; color: #0f172a; }

    .error-msg { font-size: 11px; color: #f87171; margin-top: 10px; min-height: 16px; }
    .stale     { font-size: 10px; color: #f59e0b; margin-top: 6px; }
  </style>
</head>
<body>
  <div style="max-width:900px;margin:0 auto;">
    <h1>Appliance Control System</h1>
    <div class="sub">Professional Lab Washer / Industrial Sterilizer Simulator</div>

    <div class="grid">

      <!-- Cycle progress -->
      <div class="card" style="grid-column:1/-1">
        <div class="card-title">Cycle Progress</div>
        <span class="state-badge" id="state-badge">IDLE</span>
        <div class="phases" id="phase-bar">
          <div class="phase" id="ph-INITIALISING"></div>
          <div class="phase" id="ph-WATER_INTAKE"></div>
          <div class="phase" id="ph-HEATING"></div>
          <div class="phase" id="ph-PROCESSING"></div>
          <div class="phase" id="ph-DRAINING"></div>
          <div class="phase" id="ph-COMPLETE"></div>
        </div>
        <div class="phase-labels">
          <span class="phase-label">Init</span>
          <span class="phase-label">Fill</span>
          <span class="phase-label">Heat</span>
          <span class="phase-label">Process</span>
          <span class="phase-label">Drain</span>
          <span class="phase-label">Done</span>
        </div>
        <div class="error-msg" id="error-msg"></div>
      </div>

      <!-- Temperature gauge -->
      <div class="card">
        <div class="card-title">Temperature</div>
        <canvas id="gauge" width="200" height="120"></canvas>
      </div>

      <!-- Metrics -->
      <div class="card">
        <div class="card-title">Sensor Readings</div>
        <div class="metrics">
          <div class="metric"><span class="metric-label">Water Level</span><span class="metric-value" id="water">— L</span></div>
          <div class="metric"><span class="metric-label">Door</span><span class="metric-value" id="door">—</span></div>
          <div class="metric"><span class="metric-label">Elapsed</span><span class="metric-value" id="elapsed">— s</span></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="card" style="grid-column:1/-1">
        <div class="card-title">Controls</div>
        <div class="buttons">
          <button class="btn-start" id="btn-start" onclick="sendCmd('start')">▶ Start Cycle</button>
          <button class="btn-stop"  id="btn-stop"  onclick="sendCmd('stop')">⚠ Emergency Stop</button>
          <button class="btn-reset" id="btn-reset" onclick="sendCmd('reset')">↺ Reset</button>
        </div>
        <div class="stale" id="stale-msg"></div>
      </div>

    </div>
  </div>

  <script>
    const PHASE_ORDER = ['INITIALISING','WATER_INTAKE','HEATING','PROCESSING','DRAINING','COMPLETE'];
    const HEAT_TARGET = 85;
    const MAX_TEMP    = 150;

    function drawGauge(tempC) {
      const canvas = document.getElementById('gauge');
      const ctx = canvas.getContext('2d');
      const cx = canvas.width / 2, cy = canvas.height - 10;
      const r = 80;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background arc
      ctx.beginPath();
      ctx.arc(cx, cy, r, Math.PI, 0);
      ctx.lineWidth = 14;
      ctx.strokeStyle = '#334155';
      ctx.stroke();

      // Value arc
      const frac = Math.min(1, Math.max(0, tempC / MAX_TEMP));
      const endAngle = Math.PI + frac * Math.PI;
      const col = tempC < 60 ? '#38bdf8' : tempC < 90 ? '#f59e0b' : '#f87171';
      ctx.beginPath();
      ctx.arc(cx, cy, r, Math.PI, endAngle);
      ctx.strokeStyle = col;
      ctx.stroke();

      // Setpoint tick
      const spAngle = Math.PI + (HEAT_TARGET / MAX_TEMP) * Math.PI;
      const tx = cx + (r - 7) * Math.cos(spAngle);
      const ty = cy + (r - 7) * Math.sin(spAngle);
      const tx2 = cx + (r + 7) * Math.cos(spAngle);
      const ty2 = cy + (r + 7) * Math.sin(spAngle);
      ctx.beginPath();
      ctx.moveTo(tx, ty); ctx.lineTo(tx2, ty2);
      ctx.lineWidth = 2; ctx.strokeStyle = '#f59e0b'; ctx.stroke();

      // Label
      ctx.fillStyle = col;
      ctx.font = 'bold 22px Segoe UI, system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(tempC.toFixed(1) + '°C', cx, cy - 10);
      ctx.fillStyle = '#64748b';
      ctx.font = '10px Segoe UI';
      ctx.fillText('Temperature', cx, cy + 10);
    }

    function updateUI(data) {
      const state = data.state || 'IDLE';

      // Badge
      const badge = document.getElementById('state-badge');
      badge.textContent = state;
      badge.className = 'state-badge badge-' + state;

      // Phase bar
      const phaseIdx = PHASE_ORDER.indexOf(state);
      PHASE_ORDER.forEach((ph, i) => {
        const el = document.getElementById('ph-' + ph);
        el.className = 'phase';
        if (state === 'ERROR') { el.classList.add('error'); return; }
        if (i < phaseIdx)  el.classList.add('done');
        if (i === phaseIdx) el.classList.add('active');
      });

      // Error message
      document.getElementById('error-msg').textContent = data.error || '';

      // Gauge
      drawGauge(data.temp_c ?? 20);

      // Metrics
      document.getElementById('water').textContent   = (data.water_l ?? 0).toFixed(2) + ' L';
      document.getElementById('door').textContent    = data.door_locked ? '🔒 Locked' : '🔓 Unlocked';
      document.getElementById('elapsed').textContent = (data.elapsed_sec ?? 0) + ' s';

      // Stale warning
      document.getElementById('stale-msg').textContent = data.stale
        ? '⚠ Controller unreachable — showing last known state' : '';

      // Button state
      const inCycle = !['IDLE','COMPLETE','ERROR'].includes(state);
      document.getElementById('btn-start').disabled = inCycle || state === 'COMPLETE';
      document.getElementById('btn-stop').disabled  = !inCycle;
      document.getElementById('btn-reset').disabled = !['COMPLETE','ERROR'].includes(state);
    }

    async function poll() {
      try {
        const res = await fetch('/api/state');
        if (res.ok) updateUI(await res.json());
      } catch (_) {}
    }

    async function sendCmd(cmd) {
      try {
        await fetch('/api/cmd/' + cmd, { method: 'POST' });
        await poll();
      } catch (_) {}
    }

    drawGauge(20);
    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
