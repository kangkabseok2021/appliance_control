services:

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["uv", "run", "python", "simulator.py"]
    environment:
      SOCKET_PATH: /tmp/shared/appliance-sim.sock
    volumes:
      - socket-vol:/tmp/shared
    restart: unless-stopped

  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    volumes:
      - socket-vol:/tmp/shared
    ports:
      - "8080:8080"
    depends_on:
      - simulator
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      CONTROLLER_URL: http://controller:8080
    volumes:
      - socket-vol:/tmp/shared
    ports:
      - "8099:8099"
    depends_on:
      - controller
    restart: unless-stopped

  # ── HiL Edge Testbed services ────────────────────────────────────────────

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./hil/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 || exit 1"]
      interval: 5s
      retries: 10

  hil-simulator:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["uv", "run", "python", "hil/simulator_hil.py"]
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  hil-controller:
    build:
      context: hil/controller
      dockerfile: ../../Dockerfile.controller
    command: ["./hil_controller", "mosquitto", "1883"]
    depends_on:
      - hil-simulator
    restart: unless-stopped

volumes:
  socket-vol:
