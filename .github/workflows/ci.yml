name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Washer FSM C++ ────────────────────────────────────────────────────────
  washer-cpp:
    name: Washer C++ (GoogleTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B controller/build -S controller -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build controller/build -j$(nproc)

      - name: Test
        run: ctest --test-dir controller/build --output-on-failure -V

  # ── HiL FSM C++ ───────────────────────────────────────────────────────────
  hil-cpp:
    name: HiL C++ (GoogleTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B hil/controller/build -S hil/controller -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build hil/controller/build -j$(nproc)

      - name: Test
        run: ctest --test-dir hil/controller/build --output-on-failure -V

  # ── HiL ARM64 cross-compile check ─────────────────────────────────────────
  hil-arm64:
    name: HiL ARM64 cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cross-compile for ARM64
        # Tests disabled — cannot run ARM64 binaries on x86 without QEMU
        run: |
          cmake -B hil/controller/build-arm64 -S hil/controller \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0135=NEW \
            -DBUILD_TESTS=OFF \
            -DCMAKE_C_COMPILER=/usr/bin/aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=/usr/bin/aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64
          cmake --build hil/controller/build-arm64 --target hil_controller -j$(nproc)

  # ── Batch Mixer SCADA C++20 ──────────────────────────────────────────────
  batch-mixer-cpp:
    name: Batch Mixer SCADA — 20 GoogleTests (C++20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S batch_mixer_scada -B build-batch
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build build-batch --parallel

      - name: Run 20 GoogleTests
        run: ctest --test-dir build-batch --output-on-failure -V

  # ── Bare-Metal FOC Engine — Unity C tests + Python model tests ──────────
  bare-metal-foc:
    name: Bare-Metal FOC — Unity C tests + Python SciPy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov + gcc
        run: sudo apt-get update -qq && sudo apt-get install -y lcov gcc cmake ninja-build

      - name: Configure
        run: >
          cmake -S bare_metal_foc -B build-foc
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_POLICY_DEFAULT_CMP0135=NEW
          -GNinja

      - name: Build
        run: cmake --build build-foc --parallel

      - name: Run Unity tests
        run: ctest --test-dir build-foc --output-on-failure -V

      - name: Python SciPy tests
        run: |
          pip install scipy numpy pytest --quiet
          pytest bare_metal_foc/tests_python/ -v --tb=short

  # ── Python tests (washer + HiL) ───────────────────────────────────────────
  python:
    name: Python pytest (washer + HiL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run all pytest
        run: uv run pytest -v --tb=short
